<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Mennica Imperium</title>

<style>
body {
  background: #1e1b16;
  font-family: Georgia, serif;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  margin: 0;
}

.container {
  background: linear-gradient(#e8d8b5, #d8c39a);
  padding: 25px;
  border-radius: 20px;
  width: 340px;
  box-shadow: 0 0 0 3px #7a5c2e, 0 10px 30px rgba(0,0,0,0.6);
  text-align: center;
}

.inputs {
  display: flex;
  justify-content: space-between;
  margin-bottom: 15px;
}

.input-group {
  text-align: center;
}

input {
  width: 70px;
  padding: 6px;
  border-radius: 8px;
  border: 2px solid #b89a6a;
  background: #f2e5c9;
  text-align: center;
}

button {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border: none;
  border-radius: 8px;
  background: #8b6a3a;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #a07a45;
}

.section {
  margin-top: 10px;
  font-size: 14px;
}

.row {
  display: flex;
  justify-content: space-between;
}

.result {
  margin-top: 10px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
  <h2>🪙 Mennica Imperium</h2>

  <div class="inputs">
    <div class="input-group">
      <input id="zk" type="number" placeholder="0">
      <div>ZK</div>
    </div>
    <div class="input-group">
      <input id="ss" type="number" placeholder="0">
      <div>SS</div>
    </div>
    <div class="input-group">
      <input id="mp" type="number" placeholder="0">
      <div>MP</div>
    </div>
  </div>

  <button onclick="przelicz()">→ Przekonwertuj/button>
  <button onclick="rozbij()">→ Uprość zapis</button>

  <div class="section" id="wyniki"></div>
  <div class="result" id="final"></div>

  <div style="margin-top:10px; font-size:12px;">
    1 ZK = 20 s = 240 p
  </div>
</div>

<script>
function val(x) {
  return x === "" ? 0 : parseInt(x);
}

function getTotal() {
  let zk = val(document.getElementById("zk").value);
  let ss = val(document.getElementById("ss").value);
  let mp = val(document.getElementById("mp").value);
  return zk*240 + ss*12 + mp;
}

// 1️⃣ NOWY PRZYCISK
function przelicz() {
  let total = getTotal();

  let korony = (total / 240).toFixed(2);
  let szylingi = (total / 12).toFixed(2);
  let pensy = total.toFixed(0);

  document.getElementById("wyniki").innerHTML = `
    <div class="row"><span>Korony</span><span>${korony}</span></div>
    <div class="row"><span>Szylingi</span><span>${szylingi}</span></div>
    <div class="row"><span>Pensy</span><span>${pensy}</span></div>
  `;
}

// 2️⃣ JAK WCZEŚNIEJ
function rozbij() {
  let total = getTotal();

  let zk = Math.floor(total / 240);
  let rest = total % 240;
  let ss = Math.floor(rest / 12);
  let mp = rest % 12;

  document.getElementById("final").innerText =
    `${zk} ZK, ${ss} s, ${mp} p`;
}
</script>

</body>
</html>
